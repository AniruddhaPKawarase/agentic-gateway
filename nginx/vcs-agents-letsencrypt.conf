# =============================================================================
#  VCS AI Agents — Nginx SSL Configuration (Let's Encrypt Certificate)
# =============================================================================
#
#  PRODUCTION configuration with trusted Let's Encrypt certificate.
#  Use this AFTER testing with self-signed (vcs-agents-ssl.conf).
#
#  Certificate paths (managed by Certbot):
#    Cert:  /etc/letsencrypt/live/ai.ifieldsmart.com/fullchain.pem
#    Key:   /etc/letsencrypt/live/ai.ifieldsmart.com/privkey.pem
#
#  INSTALLATION:
#    sudo bash gateway/scripts/setup-ssl-letsencrypt.sh
#
#  RENEWAL:
#    Auto: systemd timer runs certbot renew twice daily
#    Manual: sudo bash gateway/scripts/renew-ssl.sh
#
#  NOTE: Certbot may auto-modify this file during certificate issuance.
#        This file serves as the reference/template configuration.
# =============================================================================

# ── Upstream Definitions ─────────────────────────────────────────────────────

upstream rag_agent {
    server 127.0.0.1:8001;
    keepalive 8;
}

upstream sql_agent {
    server 127.0.0.1:8002;
    keepalive 8;
}

upstream construction_agent {
    server 127.0.0.1:8003;
    keepalive 8;
}

upstream ingestion_api {
    server 127.0.0.1:8004;
    keepalive 8;
}

upstream gateway_service {
    server 127.0.0.1:8005;
    keepalive 8;
}

upstream docqa_agent {
    server 127.0.0.1:8006;
    keepalive 8;
}

# =============================================================================
#  Block 1: HTTP (port 80) — Redirect ALL traffic to HTTPS
# =============================================================================

server {
    listen 80;
    server_name ai.ifieldsmart.com;

    # Let's Encrypt challenge directory (required for cert renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
#  Block 2: HTTPS (port 443) — Production SSL-Terminated Gateway
# =============================================================================

server {
    listen 443 ssl http2;
    server_name ai.ifieldsmart.com;

    # ── SSL Certificate (Let's Encrypt) ──────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/ai.ifieldsmart.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.ifieldsmart.com/privkey.pem;

    # ── SSL Hardening (Mozilla Modern profile) ───────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling (faster TLS handshake for clients)
    ssl_stapling on;
    ssl_stapling_verify on;
    # Multiple resolvers for redundancy (Google, Cloudflare, AWS VPC DNS)
    resolver 8.8.8.8 8.8.4.4 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # HSTS — tell browsers to always use HTTPS (2 years)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Global Settings ──────────────────────────────────────────────────────
    client_max_body_size 50M;
    proxy_connect_timeout 10s;
    proxy_read_timeout 120s;
    proxy_send_timeout 30s;

    # ── CORS (handled at Nginx level for all agents) ─────────────────────────
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

    # Preflight requests
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
        add_header 'Access-Control-Max-Age' 86400;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        add_header 'Content-Length' 0;
        return 204;
    }

    # ======================================================================
    #  RAG Agent — Port 8001 — Prefix /rag/
    # ======================================================================

    # SSE streaming endpoint
    location /rag/query/stream {
        proxy_pass http://rag_agent/query/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # Critical for SSE streaming
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }

    # All other RAG endpoints
    location /rag/ {
        proxy_pass http://rag_agent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
    }

    # ======================================================================
    #  SQL Agent — Port 8002 — Prefix /sql/
    # ======================================================================

    location /sql/ {
        proxy_pass http://sql_agent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
    }

    # ======================================================================
    #  Construction Agent — Port 8003 — Prefix /construction/
    # ======================================================================

    # SSE streaming endpoint
    location /construction/api/chat/stream {
        proxy_pass http://construction_agent/api/chat/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # Critical for SSE streaming
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }

    # All other Construction endpoints
    location /construction/ {
        proxy_pass http://construction_agent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
    }

    # ======================================================================
    #  Ingestion API — Port 8004 — Prefix /ingestion/
    # ======================================================================

    location /ingestion/ {
        proxy_pass http://ingestion_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 600s;  # Ingestion can take time
    }

    # ======================================================================
    #  Document Q&A Agent — Port 8006 — Prefix /docqa/
    # ======================================================================

    # SSE streaming endpoint
    location /docqa/api/chat/stream {
        proxy_pass http://docqa_agent/api/chat/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # Critical for SSE streaming
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }

    # All other Document Q&A endpoints
    location /docqa/ {
        client_max_body_size 25m;
        proxy_pass http://docqa_agent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 120s;
    }

    # ======================================================================
    #  Gateway Health Service — Port 8005 — Prefix /gateway/
    # ======================================================================

    location /gateway/ {
        proxy_pass http://gateway_service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
    }

    # ======================================================================
    #  Root — Gateway landing page
    # ======================================================================

    location = / {
        proxy_pass http://gateway_service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ======================================================================
    #  Error Pages
    # ======================================================================

    error_page 502 /502.json;
    location = /502.json {
        default_type application/json;
        return 502 '{"error": "Agent is not running or unreachable", "status": 502, "hint": "Check agent status with: bash scripts/status.sh"}';
    }

    error_page 504 /504.json;
    location = /504.json {
        default_type application/json;
        return 504 '{"error": "Agent took too long to respond", "status": 504, "hint": "The request timed out. Try again or check agent logs."}';
    }
}

