# =============================================================================
# VCS AI Agents — Nginx Gateway + SSL (ai5.ifieldsmart.com)
# =============================================================================
# Domain: ai5.ifieldsmart.com
# SSL: Let's Encrypt (existing cert, valid until 2026-06-21)
# Agents: 6 services on ports 8001-8006
# =============================================================================

upstream rag_agent { server 127.0.0.1:8001; keepalive 8; }
upstream sql_agent { server 127.0.0.1:8002; keepalive 8; }
upstream construction_agent { server 127.0.0.1:8003; keepalive 8; }
upstream ingestion_api { server 127.0.0.1:8004; keepalive 8; }
upstream gateway_service { server 127.0.0.1:8005; keepalive 8; }
upstream docqa_agent { server 127.0.0.1:8006; keepalive 8; }

# ── HTTP (port 80) — redirect to HTTPS + ACME challenge ─────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ai5.ifieldsmart.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (port 443) — Main SSL gateway ─────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ai5.ifieldsmart.com;

    # SSL Certificate (Let's Encrypt — existing cert)
    ssl_certificate /etc/letsencrypt/live/ai5.ifieldsmart.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai5.ifieldsmart.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    client_max_body_size 50M;
    proxy_connect_timeout 10s;
    proxy_read_timeout 120s;
    proxy_send_timeout 30s;

    # ── RAG Agent (8001) ─────────────────────────────────────────────────
    location /rag/query/stream {
        proxy_pass http://rag_agent/query/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }
    location /rag/ {
        proxy_pass http://rag_agent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── SQL Agent (8002) ─────────────────────────────────────────────────
    location /sql/ {
        proxy_pass http://sql_agent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Construction Agent (8003) ────────────────────────────────────────
    location /construction/api/chat/stream {
        proxy_pass http://construction_agent/api/chat/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }
    location /construction/ {
        proxy_pass http://construction_agent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Ingestion API (8004) ─────────────────────────────────────────────
    location /ingestion/ {
        proxy_pass http://ingestion_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 600s;
    }

    # ── DocQA Agent (8006) ───────────────────────────────────────────────
    location /docqa/api/chat/stream {
        proxy_pass http://docqa_agent/api/chat/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }
    location /docqa/ {
        client_max_body_size 25m;
        proxy_pass http://docqa_agent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    # ── Gateway Health (8005) ────────────────────────────────────────────
    location /gateway/ {
        proxy_pass http://gateway_service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = / {
        proxy_pass http://gateway_service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Error pages
    error_page 502 /502.json;
    location = /502.json {
        default_type application/json;
        return 502 '{"error":"Agent not running","status":502}';
    }
    error_page 504 /504.json;
    location = /504.json {
        default_type application/json;
        return 504 '{"error":"Agent timeout","status":504}';
    }
}

