# =============================================================================
#  VCS AI Agents — Nginx Reverse Proxy Configuration
# =============================================================================
#
#  This file routes ALL agent traffic through a single public port (8000).
#  Each agent runs on its own internal port and is accessed via URL prefix.
#
#  INSTALLATION:
#    sudo cp vcs-agents.conf /etc/nginx/sites-available/vcs-agents
#    sudo ln -sf /etc/nginx/sites-available/vcs-agents /etc/nginx/sites-enabled/
#    sudo rm -f /etc/nginx/sites-enabled/default
#    sudo nginx -t && sudo systemctl reload nginx
#
#  ADDING A NEW AGENT:
#    1. Copy one of the location blocks below
#    2. Change the prefix and proxy_pass port
#    3. Run: sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

upstream rag_agent {
    server 127.0.0.1:8001;
    keepalive 8;
}

upstream sql_agent {
    server 127.0.0.1:8002;
    keepalive 8;
}

upstream construction_agent {
    server 127.0.0.1:8003;
    keepalive 8;
}

upstream ingestion_api {
    server 127.0.0.1:8004;
    keepalive 8;
}

upstream gateway_service {
    server 127.0.0.1:8005;
    keepalive 8;
}

upstream docqa_agent {
    server 127.0.0.1:8006;
    keepalive 8;
}

server {
    listen 8000 default_server;
    server_name _;

    # --- Global Settings ---------------------------------------------------
    client_max_body_size 50M;
    proxy_connect_timeout 10s;
    proxy_read_timeout 120s;
    proxy_send_timeout 30s;

    # --- CORS (handled at Nginx level for all agents) ----------------------
    # Agents also have their own CORS middleware; Nginx adds headers only if
    # the agent didn't already set them.
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

    # Preflight requests
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
        add_header 'Access-Control-Max-Age' 86400;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        add_header 'Content-Length' 0;
        return 204;
    }

    # ======================================================================
    #  RAG Agent — Port 8001 — Prefix /rag/
    # ======================================================================
    #  Handles: /rag/query, /rag/query/stream, /rag/sessions/*, /rag/health
    #  Strips the /rag prefix before forwarding to the agent.

    # SSE streaming endpoint (needs special buffering config)
    location /rag/query/stream {
        proxy_pass http://rag_agent/query/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # Critical for SSE streaming
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }

    # All other RAG endpoints
    location /rag/ {
        proxy_pass http://rag_agent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
    }

    # ======================================================================
    #  SQL Agent — Port 8002 — Prefix /sql/
    # ======================================================================
    #  Handles: /sql/api/rfi/query, /sql/api/statistics, /sql/health
    #  Strips the /sql prefix before forwarding to the agent.

    location /sql/ {
        proxy_pass http://sql_agent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
    }

    # ======================================================================
    #  Construction Agent — Port 8003 — Prefix /construction/
    # ======================================================================
    #  Handles: /construction/api/chat, /construction/api/chat/stream,
    #           /construction/api/documents/*, /construction/health
    #  Strips the /construction prefix before forwarding to the agent.

    # SSE streaming endpoint
    location /construction/api/chat/stream {
        proxy_pass http://construction_agent/api/chat/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # Critical for SSE streaming
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }

    # All other Construction endpoints
    location /construction/ {
        proxy_pass http://construction_agent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
    }

    # ======================================================================
    #  Ingestion API — Port 8004 — Prefix /ingestion/
    # ======================================================================
    #  Handles: /ingestion/api/ingest, /ingestion/api/status/*, /ingestion/health
    #  Long timeout for ingestion jobs.

    location /ingestion/ {
        proxy_pass http://ingestion_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 600s;  # Ingestion can take time
    }

    # ======================================================================
    #  Document Q&A Agent — Port 8006 — Prefix /docqa/
    # ======================================================================
    #  Handles: /docqa/api/upload, /docqa/api/chat, /docqa/api/chat/stream,
    #           /docqa/api/sessions/*, /docqa/health
    #  Strips the /docqa prefix before forwarding to the agent.

    # SSE streaming endpoint
    location /docqa/api/chat/stream {
        proxy_pass http://docqa_agent/api/chat/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # Critical for SSE streaming
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }

    # All other Document Q&A endpoints (upload needs larger body size)
    location /docqa/ {
        client_max_body_size 25m;
        proxy_pass http://docqa_agent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 120s;
    }

    # ======================================================================
    #  Gateway Health Service — Port 8005 — Prefix /gateway/
    # ======================================================================
    #  Handles: /gateway/health, /gateway/agents, /gateway/info

    location /gateway/ {
        proxy_pass http://gateway_service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
    }

    # ======================================================================
    #  Root — Gateway landing page
    # ======================================================================

    location = / {
        proxy_pass http://gateway_service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ======================================================================
    #  Error Pages
    # ======================================================================

    error_page 502 /502.json;
    location = /502.json {
        default_type application/json;
        return 502 '{"error": "Agent is not running or unreachable", "status": 502, "hint": "Check agent status with: bash scripts/status.sh"}';
    }

    error_page 504 /504.json;
    location = /504.json {
        default_type application/json;
        return 504 '{"error": "Agent took too long to respond", "status": 504, "hint": "The request timed out. Try again or check agent logs."}';
    }
}
